<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السيد رفاعي - الروابط الرسمية</title>
    <style> 
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffffff, #e3e8ee);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(97, 255, 255, 0.999);
            backdrop-filter: blur(10px);
            border: 1px solid rgb(255, 255, 255);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3b82f6;
            margin-bottom: 15px;
        }

        .title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #10161c;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #000000;
            margin-bottom: 30px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: block;
            padding: 16px;
            background: rgba(0, 0, 0, 0.364);
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(219, 202, 202, 0);
        }

        .link-card:hover {
            background: #1d2c35;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(238, 238, 238, 0);
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="container">
